<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Compare</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="panel">
        <div class="header-row">
          <div>
            <h1 class="header-title">Text Compare</h1>
            <p class="header-subtitle">Edit, switch, compare texts, and see the differences.</p>
          </div>
          <div class="toolbar">
            <button class="btn-secondary" id="SwitchBtn">Switch Texts</button>
          </div>
        </div>

        <div class="text-area-row">
          <div class="text-area-column">
            <label for="leftText">Text 1</label>
            <textarea id="leftText"></textarea>
          </div>
          <div class="text-area-column">
            <label for="rightText">Text 2</label>
            <textarea id="rightText"></textarea>
          </div>
        </div>

        <div class="buttons-row">
          <button class="btn-primary" id="compareBtn">Compare!</button>
          <div class="toolbar">
            <button class="btn-extraspace" id="editTextsBtn">Remove Excess space</button>
          </div>
          <button class="btn-secondary" id="clearBtn">Clear all</button>

          <button class="btn-message" id="message"></button>
        </div>

        

        

        <div class="compare-area">
          <div class="compare-box">
            <h3>Comparison Left</h3>
            <div id="leftResult" class="compare-text"></div>
          </div>
          <div class="compare-box">
            <h3>Comparison Right</h3>
            <div id="rightResult" class="compare-text"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="src/components/textCompare_ui.js"></script>
  </body>
</html>
